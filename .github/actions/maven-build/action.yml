name: Maven Build
description: >
  Set up Java, run the Maven build (with deployment skipped), and stage any
  JaCoCo coverage reports as a workflow artifact for the companion
  upload-coverage workflow.

inputs:
  java_version:
    description: 'Java version to build against'
    required: true
  java_distribution:
    description: 'Java distribution'
    required: false
    default: 'temurin'
  maven_args:
    description: 'Maven arguments / goals'
    required: false
    default: 'clean install'
  is_main_java:
    description: 'Whether this is the main Java version (gates coverage staging) ("true"/"false")'
    required: false
    default: 'false'
  upload_coverage:
    description: 'Set "false" to skip staging coverage; otherwise coverage is staged when JaCoCo reports are found.'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Set up Java ${{ inputs.java_version }}
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: ${{ inputs.java_version }}
        distribution: ${{ inputs.java_distribution }}
        cache: maven

    - name: Build with Maven
      shell: bash
      env:
        MVN_GOALS: ${{ inputs.maven_args }}
      run: |
        # shellcheck disable=SC2086 # MVN_GOALS intentionally word-split
        mvn --batch-mode $MVN_GOALS -Dmaven.deploy.skip

    - name: Stage JaCoCo coverage reports
      id: jacoco
      if: inputs.is_main_java == 'true'
      shell: bash
      env:
        UPLOAD_COVERAGE: ${{ inputs.upload_coverage }}
        COVERAGE_DIR: ${{ runner.temp }}/coverage
      run: bash "${{ github.action_path }}/../../scripts/stage-coverage.sh"

    - name: Upload coverage reports artifact
      if: steps.jacoco.outputs.staged == 'true'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: coverage-reports
        path: ${{ runner.temp }}/coverage
        if-no-files-found: error
        retention-days: 1
