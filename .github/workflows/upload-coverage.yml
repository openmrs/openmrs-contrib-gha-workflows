name: Upload Coverage to Codecov

# Companion to the Maven build workflows. The build runs on `pull_request` and
# stages JaCoCo reports as a `coverage-reports` artifact rather than uploading
# them directly, because a run triggered by a forked pull request has neither
# secrets nor an OIDC token. This workflow is invoked from a `workflow_run`
# trigger in the consuming repo, so it executes in the base repository's
# trusted context — where OIDC is available — and uploads the staged reports
# on the fork's behalf.

on:
  workflow_call:

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  upload:
    name: Upload coverage to Codecov
    if: github.repository_owner == 'openmrs'
    runs-on: ubuntu-latest
    steps:
      - name: Download coverage reports
        id: download
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: coverage-reports
          path: coverage
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Read coverage metadata
        id: meta
        if: steps.download.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail

          META="coverage/codecov-metadata.env"
          if [ ! -f "$META" ]; then
            echo "No coverage metadata found; nothing to upload."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Parse the values by hand rather than sourcing the file: this job
          # runs in the trusted base context and the branch name originates
          # from an untrusted fork, so it must never be evaluated as shell.
          commit=$(grep '^COMMIT=' "$META" | cut -d= -f2-)
          branch=$(grep '^BRANCH=' "$META" | cut -d= -f2-)
          pr=$(grep '^PR=' "$META" | cut -d= -f2-)
          files=$(find coverage -name '*-jacoco.xml' -printf '%p,' | sed 's/,$//')

          {
            echo "commit=$commit"
            echo "branch=$branch"
            echo "pr=$pr"
            echo "files=$files"
            echo "found=true"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to Codecov
        if: steps.meta.outputs.found == 'true'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        continue-on-error: true
        with:
          use_oidc: true
          disable_search: true
          files: ${{ steps.meta.outputs.files }}
          override_commit: ${{ steps.meta.outputs.commit }}
          override_branch: ${{ steps.meta.outputs.branch }}
          override_pr: ${{ steps.meta.outputs.pr }}
