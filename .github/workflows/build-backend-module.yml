name: Build OpenMRS Maven Module

on:
  workflow_call:
    inputs:
      java_versions:
        description: 'Java versions to build against (e.g. [8, 11, 17]). If omitted, inferred from the OpenMRS platform dependency in pom.xml.'
        type: string
      main_java_version:
        description: 'Java version for publishing artifacts (must be in java_versions). If omitted, inferred from Maven compiler settings, or defaults to the minimum of java_versions.'
        type: string
      java_distribution:
        description: 'Java distribution'
        type: string
        default: 'temurin'
      maven_args:
        description: 'Maven Arguments'
        type: string
        default: 'clean install'
      upload_coverage:
        description: 'Stage JaCoCo reports as a coverage-reports artifact for the upload-coverage workflow to send to Codecov. Set "false" to skip; otherwise staged when JaCoCo reports are found.'
        type: string
      deploy_snapshots:
        description: 'Whether to deploy SNAPSHOT artifacts to the Maven repository'
        type: boolean
        default: true
      deploy_branch:
        description: 'Branch name or JSON array of branch names that trigger SNAPSHOT deployment. If omitted, deploys from main, master, and version branches (e.g. 3.x, 2.8.x).'
        type: string
      maven_server_id:
        description: 'Maven server ID to use for SNAPSHOT deployment. If omitted, inferred from <distributionManagement><snapshotRepository><id> in pom.xml.'
        type: string
    secrets:
      MAVEN_REPO_USERNAME:
        description: 'Maven repository username'
        required: false
      MAVEN_REPO_API_KEY:
        description: 'Maven repository API key / password'
        required: false

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      java_versions: ${{ steps.params.outputs.java_versions }}
      main_java_version: ${{ steps.params.outputs.main_java_version }}
      snapshot_server_id: ${{ steps.deploy.outputs.snapshot_server_id }}
      deploy_branches: ${{ steps.deploy.outputs.deploy_branches }}
      is_snapshot: ${{ steps.deploy.outputs.is_snapshot }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Checkout shared actions
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: openmrs/openmrs-contrib-gha-workflows
          ref: ${{ github.job_workflow_sha }}
          sparse-checkout: |
            .github/actions
            .github/scripts
          sparse-checkout-cone-mode: false
          path: .gha-workflows

      - name: Infer backend parameters
        id: infer
        uses: ./.gha-workflows/.github/actions/infer-backend-params
        with:
          java_versions: ${{ inputs.java_versions }}
          main_java_version: ${{ inputs.main_java_version }}
          snapshot_server_id: ${{ inputs.maven_server_id }}

      - name: Validate Java versions
        id: params
        env:
          JAVA_VERSIONS: ${{ steps.infer.outputs.java_versions }}
          MAIN_JAVA_VERSION: ${{ steps.infer.outputs.main_java_version }}
        run: |
          if [ -z "$JAVA_VERSIONS" ]; then
            echo "::error::java_versions could not be determined. Provide it explicitly or ensure pom.xml has an OpenMRS platform dependency."
            exit 1
          fi
          echo "java_versions=$JAVA_VERSIONS" >> "$GITHUB_OUTPUT"

          if [ -z "$MAIN_JAVA_VERSION" ]; then
            echo "::error::main_java_version could not be determined. Provide it explicitly or ensure pom.xml has compiler settings or an OpenMRS platform dependency."
            exit 1
          fi
          echo "main_java_version=$MAIN_JAVA_VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve deploy parameters
        id: deploy
        uses: ./.gha-workflows/.github/actions/resolve-maven-deploy-params
        with:
          project_version: ${{ steps.infer.outputs.project_version }}
          inferred_snapshot_server_id: ${{ steps.infer.outputs.snapshot_server_id }}
          deploy_branch: ${{ inputs.deploy_branch }}
          ref_name: ${{ github.ref_name }}

  build:
    name: Build with Java ${{ matrix.java }}
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        java: ${{ fromJSON(needs.prepare.outputs.java_versions) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout shared actions
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: openmrs/openmrs-contrib-gha-workflows
          ref: ${{ github.job_workflow_sha }}
          sparse-checkout: |
            .github/actions
            .github/scripts
          sparse-checkout-cone-mode: false
          path: .gha-workflows

      - name: Build with Maven
        uses: ./.gha-workflows/.github/actions/maven-build
        with:
          java_version: ${{ matrix.java }}
          java_distribution: ${{ inputs.java_distribution }}
          maven_args: ${{ inputs.maven_args }}
          is_main_java: ${{ matrix.java == fromJSON(needs.prepare.outputs.main_java_version) }}
          upload_coverage: ${{ inputs.upload_coverage }}

      - name: Get OMOD file Name
        id: get_omod_name
        run: echo "final_name=$(mvn help:evaluate -Dexpression=project.build.finalName -q -DforceStdout -pl omod)" >> "$GITHUB_OUTPUT"

      - name: Generate checksums for OMOD
        if: matrix.java == fromJSON(needs.prepare.outputs.main_java_version)
        run: |

          set -euo pipefail

          FILE="omod/target/${{ steps.get_omod_name.outputs.final_name }}.omod"

          sha1sum   "$FILE" | awk '{print $1}' > "$FILE.sha1"
          sha256sum "$FILE" | awk '{print $1}' > "$FILE.sha256"

      - name: Upload OMOD + checksums
        if: matrix.java == fromJSON(needs.prepare.outputs.main_java_version)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.get_omod_name.outputs.final_name }}
          path: |
            omod/target/${{ steps.get_omod_name.outputs.final_name }}.omod
            omod/target/${{ steps.get_omod_name.outputs.final_name }}.omod.sha1
            omod/target/${{ steps.get_omod_name.outputs.final_name }}.omod.sha256
          if-no-files-found: error

  deploy:
    name: Deploy SNAPSHOT to Maven
    needs: [prepare, build]
    if: >-
      inputs.deploy_snapshots
      && needs.prepare.outputs.is_snapshot == 'true'
      && github.repository_owner == 'openmrs'
      && github.head_ref == ''
      && contains(fromJSON(needs.prepare.outputs.deploy_branches), github.ref_name)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout shared actions
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: openmrs/openmrs-contrib-gha-workflows
          ref: ${{ github.job_workflow_sha }}
          sparse-checkout: |
            .github/actions
            .github/scripts
          sparse-checkout-cone-mode: false
          path: .gha-workflows

      - name: Deploy SNAPSHOT to Maven
        uses: ./.gha-workflows/.github/actions/maven-deploy
        with:
          java_version: ${{ needs.prepare.outputs.main_java_version }}
          java_distribution: ${{ inputs.java_distribution }}
          server_id: ${{ needs.prepare.outputs.snapshot_server_id }}
          maven_repo_username: ${{ secrets.MAVEN_REPO_USERNAME }}
          maven_repo_api_key: ${{ secrets.MAVEN_REPO_API_KEY }}
