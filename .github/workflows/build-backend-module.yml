name: Build OpenMRS Maven Module

on:
  workflow_call:
    inputs:
      java_versions:
        description: 'Java versions to build against (e.g. [8, 11, 17]). If omitted, inferred from the OpenMRS platform dependency in pom.xml.'
        type: string
      main_java_version:
        description: 'Java version for publishing artifacts (must be in java_versions). If omitted, inferred from Maven compiler settings, or defaults to the minimum of java_versions.'
        type: string
      java_distribution:
        description: 'Java distribution'
        type: string
        default: 'temurin'
      maven_args:
        description: 'Maven Arguments'
        type: string
        default: 'clean install'
      upload_coverage:
        description: 'Upload coverage reports to Codecov. If omitted, uploads when JaCoCo reports are found after the build. Set to "true" or "false" to override.'
        type: string
      deploy_snapshots:
        description: 'Whether to deploy SNAPSHOT artifacts to the Maven repository'
        type: boolean
        default: true
      deploy_branch:
        description: 'Branch name or JSON array of branch names that trigger SNAPSHOT deployment. If omitted, deploys from main, master, and version branches (e.g. 3.x, 2.8.x).'
        type: string
      maven_server_id:
        description: 'Maven server ID to use for SNAPSHOT deployment (must match the <snapshotRepository><id> in the project pom.xml)'
        type: string
        default: 'openmrs-repo-snapshots'
    secrets:
      MAVEN_REPO_USERNAME:
        description: 'Maven repository username'
        required: false
      MAVEN_REPO_API_KEY:
        description: 'Maven repository API key / password'
        required: false

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      java_versions: ${{ steps.java.outputs.versions }}
      main_java_version: ${{ steps.java.outputs.main_version }}
      deploy_branches: ${{ steps.deploy.outputs.branches }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Checkout inference script
        if: ${{ !inputs.java_versions || !inputs.main_java_version }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: openmrs/openmrs-contrib-gha-workflows
          sparse-checkout: .github/scripts/infer-java-versions.py
          sparse-checkout-cone-mode: false
          path: .gha-workflows

      - name: Infer Java versions from pom.xml
        id: infer
        if: ${{ !inputs.java_versions || !inputs.main_java_version }}
        run: python3 .gha-workflows/.github/scripts/infer-java-versions.py

      - name: Resolve Java versions
        id: java
        env:
          INPUT_JAVA_VERSIONS: ${{ inputs.java_versions }}
          INPUT_MAIN_JAVA_VERSION: ${{ inputs.main_java_version }}
          INFERRED_JAVA_VERSIONS: ${{ steps.infer.outputs.java_versions }}
          INFERRED_MAIN_JAVA_VERSION: ${{ steps.infer.outputs.main_java_version }}
        run: |
          JAVA_VERSIONS="${INPUT_JAVA_VERSIONS:-$INFERRED_JAVA_VERSIONS}"
          if [ -z "$JAVA_VERSIONS" ]; then
            echo "::error::java_versions could not be determined. Provide it explicitly or ensure pom.xml has an OpenMRS platform dependency."
            exit 1
          fi
          if echo "$JAVA_VERSIONS" | jq -e 'type == "array"' > /dev/null 2>&1; then
            echo "versions=$JAVA_VERSIONS" >> "$GITHUB_OUTPUT"
          else
            echo "versions=[$JAVA_VERSIONS]" >> "$GITHUB_OUTPUT"
          fi

          MAIN_VERSION="${INPUT_MAIN_JAVA_VERSION:-$INFERRED_MAIN_JAVA_VERSION}"
          if [ -z "$MAIN_VERSION" ]; then
            echo "::error::main_java_version could not be determined. Provide it explicitly or ensure pom.xml has compiler settings or an OpenMRS platform dependency."
            exit 1
          fi
          echo "main_version=$MAIN_VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve deploy branches
        id: deploy
        env:
          INPUT_DEPLOY_BRANCH: ${{ inputs.deploy_branch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$INPUT_DEPLOY_BRANCH" ]; then
            # User supplied explicit branches — use as-is
            if echo "$INPUT_DEPLOY_BRANCH" | jq -e 'type == "array"' > /dev/null 2>&1; then
              echo "branches=$INPUT_DEPLOY_BRANCH" >> "$GITHUB_OUTPUT"
            else
              echo "branches=$(jq -nc --arg v "$INPUT_DEPLOY_BRANCH" '[$v]')" >> "$GITHUB_OUTPUT"
            fi
          else
            # Auto-detect: main, master, and version branches (e.g. 3.x, 2.8.x)
            # Version branches are only added if the POM version matches the branch prefix
            BRANCHES='["main", "master"]'
            if echo "$REF_NAME" | grep -qE '^[0-9]+\.x$|^[0-9]+\.[0-9]+\.x$'; then
              PREFIX=$(echo "$REF_NAME" | sed 's/\.x$/\./')
              POM_VERSION=$(python3 -c "
          import xml.etree.ElementTree as ET
          root = ET.parse('pom.xml').getroot()
          for tag in ('version', '{http://maven.apache.org/POM/4.0.0}version'):
              v = root.find(tag)
              if v is not None and v.text:
                  print(v.text.strip()); break
          else:
              for tag in ('parent/version', '{http://maven.apache.org/POM/4.0.0}parent/{http://maven.apache.org/POM/4.0.0}version'):
                  v = root.find(tag)
                  if v is not None and v.text:
                      print(v.text.strip()); break
          " 2>/dev/null || true)
              if echo "$POM_VERSION" | grep -q "^$PREFIX"; then
                BRANCHES=$(echo "$BRANCHES" | jq -c --arg b "$REF_NAME" '. + [$b]')
              fi
            fi
            echo "branches=$BRANCHES" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build with Java ${{ matrix.java }}
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        java: ${{ fromJSON(needs.prepare.outputs.java_versions) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ matrix.java }}
          distribution: ${{ inputs.java_distribution }}
          cache: maven

      - name: Build with Maven
        run: mvn --batch-mode ${{ inputs.maven_args }} -Dmaven.deploy.skip

      - name: Check for JaCoCo coverage reports
        id: jacoco
        if: matrix.java == fromJSON(needs.prepare.outputs.main_java_version)
        env:
          UPLOAD_COVERAGE: ${{ inputs.upload_coverage }}
        run: |
          VALUE=$(echo "$UPLOAD_COVERAGE" | tr '[:upper:]' '[:lower:]')
          if [ "$VALUE" = "true" ]; then
            echo "upload=true" >> "$GITHUB_OUTPUT"
          elif [ "$VALUE" = "false" ]; then
            echo "upload=false" >> "$GITHUB_OUTPUT"
          elif find . -name 'jacoco.xml' -print -quit 2>/dev/null | grep -q .; then
            echo "upload=true" >> "$GITHUB_OUTPUT"
          else
            echo "upload=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload coverage to Codecov
        if: steps.jacoco.outputs.upload == 'true'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        continue-on-error: true
        with:
          use_oidc: true

      - name: Get OMOD file Name
        id: get_omod_name
        run: echo "final_name=$(mvn help:evaluate -Dexpression=project.build.finalName -q -DforceStdout -pl omod)" >> $GITHUB_OUTPUT

      - name: Generate checksums for OMOD
        if: matrix.java == fromJSON(needs.prepare.outputs.main_java_version)
        run: |

          set -euo pipefail

          FILE="omod/target/${{ steps.get_omod_name.outputs.final_name }}.omod"

          sha1sum   "$FILE" | awk '{print $1}' > "$FILE.sha1"
          sha256sum "$FILE" | awk '{print $1}' > "$FILE.sha256"

      - name: Upload OMOD + checksums
        if: matrix.java == fromJSON(needs.prepare.outputs.main_java_version)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.get_omod_name.outputs.final_name }}
          path: |
            omod/target/${{ steps.get_omod_name.outputs.final_name }}.omod
            omod/target/${{ steps.get_omod_name.outputs.final_name }}.omod.sha1
            omod/target/${{ steps.get_omod_name.outputs.final_name }}.omod.sha256
          if-no-files-found: error

  deploy:
    name: Deploy SNAPSHOT to Maven
    needs: [prepare, build]
    if: >-
      inputs.deploy_snapshots
      && github.repository_owner == 'openmrs'
      && github.head_ref == ''
      && contains(fromJSON(needs.prepare.outputs.deploy_branches), github.ref_name)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java ${{ needs.prepare.outputs.main_java_version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ needs.prepare.outputs.main_java_version }}
          distribution: ${{ inputs.java_distribution }}
          cache: maven
          server-id: ${{ inputs.maven_server_id }}
          server-username: MAVEN_REPO_USERNAME
          server-password: MAVEN_REPO_API_KEY

      - name: Deploy SNAPSHOT to Maven
        run: mvn --batch-mode deploy -DskipTests
        env:
          MAVEN_REPO_USERNAME: ${{ secrets.MAVEN_REPO_USERNAME }}
          MAVEN_REPO_API_KEY: ${{ secrets.MAVEN_REPO_API_KEY }}
