name: Validate PR title

on:
  workflow_call:

jobs:
  pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Validate pull request title
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_TYPE: ${{ github.event.pull_request.user.type }}
        run: |
          python3 - <<'PY'
          import os
          import re
          import sys

          title = os.environ['PR_TITLE'].strip()
          author_login = os.environ.get('PR_AUTHOR_LOGIN', '')
          author_type = os.environ.get('PR_AUTHOR_TYPE', '')
          allowed_types = 'feat|fix|chore|docs|test'

          ticketed_pattern = re.compile(rf'^\(({allowed_types})\) [A-Z][A-Z0-9]+-\d+: [A-Z].+')
          ticketless_pattern = re.compile(rf'^\(({allowed_types})\) [A-Z].+')
          ticket_like_pattern = re.compile(rf'^\(({allowed_types})\) [A-Z][A-Z0-9]+-\d+\b')
          breaking_ticketed_pattern = re.compile(r'^\(BREAKING\) [A-Z][A-Z0-9]+-\d+: [A-Z].+')
          breaking_ticketless_pattern = re.compile(r'^\(BREAKING\) [A-Z].+')
          breaking_ticket_like_pattern = re.compile(r'^\(BREAKING\) [A-Z][A-Z0-9]+-\d+\b')

          def fail(reason: str) -> None:
              print('PR title validation failed.')
              print()
              print(f'Reason: {reason}')
              print(f"Received title: {title!r}")
              print()
              print('Accepted formats:')
              print('- (type) TICKET: Sentence case summary')
              print('- (type) Sentence case summary')
              print('- (BREAKING) TICKET: Sentence case summary')
              print('- (BREAKING) Sentence case summary')
              print()
              print('Allowed types: BREAKING, feat, fix, chore, docs, test')
              print()
              print('Passing examples:')
              print('- (fix) O3-4522: Fix run report date format error')
              print('- (feat) O3-2724: Move overlays into the framework')
              print('- (BREAKING) O3-9000: Replace the public orders API contract')
              print('- (docs) Fix README examples')
              sys.exit(1)

          if author_type == 'Bot' or author_login.endswith('[bot]') or author_login.endswith('-bot'):
              print(f'Skipping PR title validation for bot author {author_login}.')
              sys.exit(0)

          if ticketed_pattern.fullmatch(title):
              print('Ticketed PR title format is valid.')
              sys.exit(0)

          if breaking_ticketed_pattern.fullmatch(title):
              print('Breaking-change PR title format is valid.')
              sys.exit(0)

          if ticket_like_pattern.match(title):
              fail("Ticketed titles must use the exact format '(type) TICKET: Sentence case summary'.")

          if breaking_ticket_like_pattern.match(title):
              fail("BREAKING titles must use either '(BREAKING) TICKET: Sentence case summary' or '(BREAKING) Sentence case summary'.")

          if ticketless_pattern.fullmatch(title):
              print('Ticketless PR title format is valid.')
              sys.exit(0)

          if breaking_ticketless_pattern.fullmatch(title):
              print('Breaking-change PR title format is valid.')
              sys.exit(0)

          fail('PR title does not match the canonical OpenMRS format.')
          PY
