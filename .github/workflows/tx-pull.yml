name: Pull Translations from Transifex

on:
  workflow_call:
    inputs:
      transifex_args:
        description: 'Arguments to pass to the Transifex CLI'
        type: string
        default: 'pull --force --all'
      branch:
        description: 'Branch name for the PR'
        type: string
        default: 'chore/update-transifex'
      commit_message:
        description: 'Commit message for the PR'
        type: string
        default: '(chore) Update translations from Transifex'
      pr_title:
        description: 'Title for the PR'
        type: string
        default: '(chore) Update translations from Transifex'
      pr_body:
        description: 'Body text for the PR'
        type: string
        default: 'Automated updates of translations pulled from Transifex'
      author_name:
        description: 'Git author name'
        type: string
        default: 'OpenMRS Bot'
      author_email:
        description: 'Git author email'
        type: string
        default: 'infrastructure@openmrs.org'
      committer_name:
        description: 'Git committer name'
        type: string
        default: 'OpenMRS Bot'
      committer_email:
        description: 'Git committer email'
        type: string
        default: 'infrastructure@openmrs.org'
    secrets:
      TRANSIFEX_TOKEN:
        required: true
      APP_ID:
        description: 'GitHub App ID for the translation bot. When set with APP_PRIVATE_KEY, a short-lived App token is preferred over BOT_GH_TOKEN.'
        required: false
      APP_PRIVATE_KEY:
        description: 'Private key for the translation bot GitHub App.'
        required: false
      BOT_GH_TOKEN:
        description: 'Legacy bot PAT for creating/merging the PR. Fallback when App credentials are not provided.'
        required: false

jobs:
  pull-translations-from-transifex:
    name: Pull translations from Transifex
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      HAS_APP_CREDS: ${{ secrets.APP_ID != '' && secrets.APP_PRIVATE_KEY != '' }}
      HAS_CREDS: ${{ (secrets.APP_ID != '' && secrets.APP_PRIVATE_KEY != '') || secrets.BOT_GH_TOKEN != '' }}
      PARTIAL_APP_CREDS: ${{ (secrets.APP_ID != '') != (secrets.APP_PRIVATE_KEY != '') }}

    steps:
      - name: 🔒 Reject partial App credentials
        if: env.PARTIAL_APP_CREDS == 'true'
        run: |
          echo "::error::APP_ID and APP_PRIVATE_KEY must be set together — got one without the other. Check for a typo in the caller's secret names."
          exit 1

      - name: 🔒 Verify credentials
        if: env.HAS_CREDS != 'true'
        run: |
          echo "::error::Creating and auto-merging the translation PR needs credentials: set APP_ID + APP_PRIVATE_KEY (preferred) or BOT_GH_TOKEN. A PR authored by github.token does not trigger CI and cannot be self-approved."
          exit 1

      - name: 📥 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🌐 Pull translations using Transifex client
        uses: transifex/cli-action@584fd205cbe598773b5a81ce711fa44842678189 # v2
        with:
          token: ${{ secrets.TRANSIFEX_TOKEN }}
          args: ${{ inputs.transifex_args }}

      - name: 🔑 Generate GitHub App token
        id: app-token
        if: env.HAS_APP_CREDS == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 📝 Create PR if necessary
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: ${{ inputs.commit_message }}
          title: ${{ inputs.pr_title }}
          body: ${{ inputs.pr_body }}
          branch: ${{ inputs.branch }}
          author: '${{ inputs.author_name }} <${{ inputs.author_email }}>'
          committer: '${{ inputs.committer_name }} <${{ inputs.committer_email }}>'
          token: ${{ steps.app-token.outputs.token || secrets.BOT_GH_TOKEN }}

      - name: ✅ Auto approve PR
        if: steps.cpr.outputs.pull-request-operation == 'created' || steps.cpr.outputs.pull-request-operation == 'updated'
        run: gh pr review --approve "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 🔀 Automerge PR
        if: steps.cpr.outputs.pull-request-operation == 'created' || steps.cpr.outputs.pull-request-operation == 'updated'
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.BOT_GH_TOKEN }}
