name: OWASP Dependency Check

on:
  workflow_call:
    inputs:
      java_version:
        description: 'Java version to use for the build'
        type: string
        default: '21'
      java_distribution:
        description: 'Java distribution'
        type: string
        default: 'temurin'
      maven_args:
        description: 'Maven arguments for the build step'
        type: string
        default: 'clean install -DskipTests'
      fail_on_cvss:
        description: 'CVSS score threshold to fail the build (0-10)'
        type: string
        default: '6.2'
      suppression_file:
        description: 'Path to the dependency-check suppressions XML file'
        type: string
        default: 'dependency-check-suppressions.xml'
      report_format:
        description: 'Output report format (e.g. ALL, HTML, JSON, XML)'
        type: string
        default: 'ALL'
      additional_args:
        description: 'Additional arguments to pass to OWASP Dependency-Check'
        type: string
        default: '--enableRetired'
    secrets:
      NVD_API_KEY:
        description: "NVD API key for faster vulnerability database updates (Not available to workflows triggered by pull requests from forks)"
        required: false
      BOT_GH_TOKEN:
        description: "GitHub token for pushing to the dashboard repo"
        required: false

jobs:
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SUPPRESSION_FILE: ${{ inputs.suppression_file }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # 🔍 Detect project type
      - name: Detect project type
        id: detect
        run: |
          if [ -f "pom.xml" ]; then
            echo "type=java" >> $GITHUB_OUTPUT
          elif [ -f "package.json" ]; then
            echo "type=node" >> $GITHUB_OUTPUT
          else
            echo "type=unknown" >> $GITHUB_OUTPUT
          fi

      # Fail if unknown
      - name: Fail if project type is unknown
        if: steps.detect.outputs.type == 'unknown'
        run: |
          echo "❌ Could not detect project type. Expected pom.xml or package.json at repo root."
          exit 1

      # ☕ Java setup
      - name: Set up Java ${{ inputs.java_version }}
        if: steps.detect.outputs.type == 'java'
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java_version }}
          distribution: ${{ inputs.java_distribution }}
          cache: maven

      # ⚛️ Node setup
      - name: Set up Node.js
        if: steps.detect.outputs.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 📄 Suppression file
      - name: Fetch default suppression file
        run: |
          if [ ! -f "${SUPPRESSION_FILE}" ]; then
            echo "Suppression file not found. Downloading default..."
            curl -sL https://raw.githubusercontent.com/openmrs/openmrs-contrib-gha-workflows/main/dependency-check-suppressions.xml \
              -o "${SUPPRESSION_FILE}"
          else
            echo "Suppression file already exists."
          fi

      # ☕ Build Java
      - name: Build project with Maven
        if: steps.detect.outputs.type == 'java'
        run: mvn --batch-mode ${{ inputs.maven_args }}

      # ⚛️ Install Node deps
      - name: Install Node dependencies
        if: steps.detect.outputs.type == 'node'
        run: yarn install --immutable

      # 🔐 OWASP scan
      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@1e54355a8b4c8abaa8cc7d0b70aa655a3bb15a6c
        id: dependency-check
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: ${{ github.event.repository.name }}
          path: '.'
          format: ${{ inputs.report_format }}
          out: 'reports'
          args: >
            --failOnCVSS ${{ inputs.fail_on_cvss }}
            --suppression ${{ env.SUPPRESSION_FILE }}
            ${{ inputs.additional_args }}
            ${{ secrets.NVD_API_KEY && format('--nvdApiKey {0}', secrets.NVD_API_KEY) || '' }}
            ${{ steps.detect.outputs.type == 'node' && '--scan node_modules --scan yarn.lock --exclude "**/packages/**"' || '' }}

      - name: Upload Dependency Check report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: Dependency Check report
          path: ${{ github.workspace }}/reports

      - name: Checkout dependency vulnerability dashboard repo
        if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/checkout@v6
        with:
          repository: openmrs/openmrs-contrib-dependency-vulnerability-dashboard
          token: ${{ secrets.BOT_GH_TOKEN }}
          path: dashboard-repo

      - name: Copy report into dependency vulnerability dashboard repo
        if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          mkdir -p dashboard-repo/data
          cp reports/dependency-check-report.json dashboard-repo/data/${{ github.event.repository.name }}.json

      - name: Commit and push report
        if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          cd dashboard-repo
          git config user.name "OpenMRS Bot"
          git config user.email "infrastructure@openmrs.org"

          git add data/${{ github.event.repository.name }}.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update dependency check report for ${{ github.event.repository.name }}"
            git push
          fi
