name: OWASP Dependency Check

on:
  workflow_call:
    inputs:
      java_version:
        description: 'Java version to use for the build. If omitted, inferred from Maven compiler settings in pom.xml.'
        type: string
      node_version:
        description: 'Node.js version to use for the build. If omitted, inferred from engines.node in package.json.'
        type: string
      java_distribution:
        description: 'Java distribution'
        type: string
        default: 'temurin'
      maven_args:
        description: 'Maven arguments for the build step'
        type: string
        default: 'clean install -DskipTests'
      fail_on_cvss:
        description: 'CVSS score threshold to fail the build (0-10)'
        type: string
        default: '6.2'
      suppression_file:
        description: 'Path to the dependency-check suppressions XML file'
        type: string
        default: 'dependency-check-suppressions.xml'
      report_format:
        description: 'Output report format (e.g. ALL, HTML, JSON, XML)'
        type: string
        default: 'ALL'
      additional_args:
        description: 'Additional arguments to pass to OWASP Dependency-Check'
        type: string
        default: '--enableRetired'
    secrets:
      NVD_API_KEY:
        description: "NVD API key for faster vulnerability database updates (Not available to workflows triggered by pull requests from forks)"
        required: false
      BOT_GH_TOKEN:
        description: "GitHub token for pushing to the dashboard repo"
        required: false

jobs:
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SUPPRESSION_FILE: ${{ inputs.suppression_file }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect project type
        id: detect
        run: |
          if [ -f "pom.xml" ]; then
            echo "type=java" >> $GITHUB_OUTPUT
          elif [ -f "package.json" ]; then
            echo "type=node" >> $GITHUB_OUTPUT
          else
            echo "type=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Fail if project type is unknown
        if: steps.detect.outputs.type == 'unknown'
        run: |
          echo "Could not detect project type. Expected pom.xml or package.json at repo root."
          exit 1

      - name: Checkout inference scripts and resources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: openmrs/openmrs-contrib-gha-workflows
          ref: ${{ github.workflow_sha }}
          sparse-checkout: |
            .github/actions
            .github/scripts
            .github/resources/owasp
          sparse-checkout-cone-mode: false
          path: .gha-workflows

      - name: Infer backend parameters
        id: infer-backend
        if: steps.detect.outputs.type == 'java'
        uses: ./.gha-workflows/.github/actions/infer-backend-params
        with:
          main_java_version: ${{ inputs.java_version }}

      - name: Resolve Java version
        id: java
        if: steps.detect.outputs.type == 'java'
        env:
          INFERRED: ${{ steps.infer-backend.outputs.main_java_version }}
        run: |
          echo "version=${INFERRED:-21}" >> "$GITHUB_OUTPUT"

      - name: Infer Node.js version from package.json
        id: infer-node
        if: steps.detect.outputs.type == 'node' && !inputs.node_version
        run: python3 .gha-workflows/.github/scripts/infer_node_version.py

      - name: Resolve Node.js version
        id: node
        if: steps.detect.outputs.type == 'node'
        env:
          INPUT_NODE_VERSION: ${{ inputs.node_version }}
          INFERRED_NODE_VERSION: ${{ steps.infer-node.outputs.node_version }}
          DEFAULT_NODE_VERSION: '22'
        run: |
          echo "version=${INPUT_NODE_VERSION:-${INFERRED_NODE_VERSION:-$DEFAULT_NODE_VERSION}}" >> "$GITHUB_OUTPUT"

      - name: Set up Java ${{ steps.java.outputs.version }}
        if: steps.detect.outputs.type == 'java'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ steps.java.outputs.version }}
          distribution: ${{ inputs.java_distribution }}
          cache: maven

      - name: Set up Node.js
        if: steps.detect.outputs.type == 'node'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ steps.node.outputs.version }}

      - name: Check for suppression file
        id: suppression
        run: |
          if [ -f "${SUPPRESSION_FILE}" ]; then
            echo "Suppression file already exists."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Suppression file not found. Will fetch default."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy default suppression file
        if: steps.suppression.outputs.exists == 'false'
        run: cp .gha-workflows/.github/resources/owasp/dependency-check-suppressions.xml "${SUPPRESSION_FILE}"

      - name: Build project with Maven
        if: steps.detect.outputs.type == 'java'
        env:
          MAVEN_ARGS: ${{ inputs.maven_args }}
        run: mvn --batch-mode $MAVEN_ARGS

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@75ba02d6183445fe0761d26e836bde58b1560600 # 1.1.0
        id: dependency-check
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: ${{ github.event.repository.name }}
          path: '.'
          format: ${{ inputs.report_format }}
          out: 'reports'
          args: >
            --failOnCVSS ${{ inputs.fail_on_cvss }}
            --suppression ${{ env.SUPPRESSION_FILE }}
            ${{ inputs.additional_args }}
            ${{ secrets.NVD_API_KEY && format('--nvdApiKey {0}', secrets.NVD_API_KEY) || '' }}
            ${{ steps.detect.outputs.type == 'node' && '--exclude "**/packages/**"' || '' }}

      - name: Upload Dependency Check report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Dependency Check report
          path: ${{ github.workspace }}/reports

      - name: Checkout dependency vulnerability dashboard repo
        if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: openmrs/openmrs-contrib-dependency-vulnerability-dashboard
          token: ${{ secrets.BOT_GH_TOKEN }}
          path: dashboard-repo

      - name: Copy report into dependency vulnerability dashboard repo
        if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          mkdir -p dashboard-repo/data
          cp reports/dependency-check-report.json dashboard-repo/data/${{ github.event.repository.name }}.json

      - name: Commit and push report
        if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          cd dashboard-repo
          git config user.name "OpenMRS Bot"
          git config user.email "infrastructure@openmrs.org"

          git add data/${{ github.event.repository.name }}.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update dependency check report for ${{ github.event.repository.name }}"
            git push
          fi
