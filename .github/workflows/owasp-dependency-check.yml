name: OWASP Dependency Check

on:
  workflow_call:
    inputs:
      java_version:
        description: 'Java version to use for the build. If omitted, inferred from Maven compiler settings in pom.xml.'
        type: string
      node_version:
        description: 'Node.js version to use for the build. If omitted, inferred from engines.node in package.json.'
        type: string
      java_distribution:
        description: 'Java distribution'
        type: string
        default: 'temurin'
      maven_args:
        description: 'Maven arguments for the build step'
        type: string
        default: 'clean install -DskipTests'
      fail_on_cvss:
        description: 'CVSS score threshold to fail the build (0-10)'
        type: string
        default: '6.2'
      suppression_file:
        description: 'Path to the dependency-check suppressions XML file'
        type: string
        default: 'dependency-check-suppressions.xml'
      report_format:
        description: 'Output report format (e.g. ALL, HTML, JSON, XML)'
        type: string
        default: 'ALL'
      additional_args:
        description: 'Additional arguments to pass to OWASP Dependency-Check'
        type: string
        default: '--enableRetired'
    secrets:
      NVD_API_KEY:
        description: "NVD API key for faster vulnerability database updates (Not available to workflows triggered by pull requests from forks)"
        required: false
      APP_ID:
        description: "GitHub App ID for the security dashboard bot (contents:write on openmrs-contrib-dependency-vulnerability-dashboard). When set with APP_PRIVATE_KEY, a short-lived App token is preferred over BOT_GH_TOKEN."
        required: false
      APP_PRIVATE_KEY:
        description: "Private key for the security dashboard bot GitHub App."
        required: false
      BOT_GH_TOKEN:
        description: "Legacy bot PAT for pushing to the dashboard repo. Fallback when App credentials are not provided."
        required: false

jobs:
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      report_produced: ${{ steps.report-check.outputs.produced }}

    env:
      SUPPRESSION_FILE: ${{ inputs.suppression_file }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Detect project type
        id: detect
        run: |
          if [ -f "pom.xml" ]; then
            echo "type=java" >> "$GITHUB_OUTPUT"
          elif [ -f "package.json" ]; then
            echo "type=node" >> "$GITHUB_OUTPUT"
          else
            echo "type=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if project type is unknown
        if: steps.detect.outputs.type == 'unknown'
        run: |
          echo "Could not detect project type. Expected pom.xml or package.json at repo root."
          exit 1

      - name: Checkout inference scripts and resources
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: openmrs/openmrs-contrib-gha-workflows
          ref: ${{ github.job_workflow_sha }}
          sparse-checkout: |
            .github/actions
            .github/scripts
            .github/resources/owasp
          sparse-checkout-cone-mode: false
          path: .gha-workflows

      - name: Infer backend parameters
        id: infer-backend
        if: steps.detect.outputs.type == 'java'
        uses: ./.gha-workflows/.github/actions/infer-backend-params
        with:
          main_java_version: ${{ inputs.java_version }}

      - name: Resolve Java version
        id: java
        if: steps.detect.outputs.type == 'java'
        env:
          INFERRED: ${{ steps.infer-backend.outputs.main_java_version }}
        run: |
          echo "version=${INFERRED:-21}" >> "$GITHUB_OUTPUT"

      - name: Infer Node.js version from package.json
        id: infer-node
        if: steps.detect.outputs.type == 'node' && !inputs.node_version
        run: python3 .gha-workflows/.github/scripts/infer_node_version.py

      - name: Resolve Node.js version
        id: node
        if: steps.detect.outputs.type == 'node'
        env:
          INPUT_NODE_VERSION: ${{ inputs.node_version }}
          INFERRED_NODE_VERSION: ${{ steps.infer-node.outputs.node_version }}
          DEFAULT_NODE_VERSION: '22'
        run: |
          echo "version=${INPUT_NODE_VERSION:-${INFERRED_NODE_VERSION:-$DEFAULT_NODE_VERSION}}" >> "$GITHUB_OUTPUT"

      - name: Set up Java ${{ steps.java.outputs.version }}
        if: steps.detect.outputs.type == 'java'
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: ${{ steps.java.outputs.version }}
          distribution: ${{ inputs.java_distribution }}
          cache: maven

      - name: Set up Node.js
        if: steps.detect.outputs.type == 'node'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ steps.node.outputs.version }}

      - name: Check for suppression file
        id: suppression
        run: |
          if [ -f "${SUPPRESSION_FILE}" ]; then
            echo "Suppression file already exists."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Suppression file not found. Will fetch default."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy default suppression file
        if: steps.suppression.outputs.exists == 'false'
        run: cp .gha-workflows/.github/resources/owasp/dependency-check-suppressions.xml "${SUPPRESSION_FILE}"

      - name: Build project with Maven
        if: steps.detect.outputs.type == 'java'
        env:
          MVN_GOALS: ${{ inputs.maven_args }}
        run: |
          # shellcheck disable=SC2086 # MVN_GOALS intentionally word-split
          mvn --batch-mode $MVN_GOALS

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@1e54355a8b4c8abaa8cc7d0b70aa655a3bb15a6c  # main commit this is setup for
        id: dependency-check
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: ${{ github.event.repository.name }}
          path: '.'
          format: ${{ inputs.report_format }}
          out: 'reports'
          args: >
            --failOnCVSS ${{ inputs.fail_on_cvss }}
            --suppression ${{ env.SUPPRESSION_FILE }}
            ${{ inputs.additional_args }}
            ${{ secrets.NVD_API_KEY && format('--nvdApiKey {0}', secrets.NVD_API_KEY) || '' }}
            ${{ steps.detect.outputs.type == 'node' && '--exclude "**/packages/**"' || '' }}

      - name: Upload Dependency Check report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Dependency Check report
          path: ${{ github.workspace }}/reports

      - name: Record whether a JSON report was produced
        id: report-check
        if: always()
        run: |
          if [ -f reports/dependency-check-report.json ]; then
            echo "produced=true" >> "$GITHUB_OUTPUT"
          else
            echo "produced=false" >> "$GITHUB_OUTPUT"
          fi

  sync-dashboard:
    name: Sync report to vulnerability dashboard
    runs-on: ubuntu-latest
    needs: dependency-check
    if: >-
      always()
      && needs.dependency-check.outputs.report_produced == 'true'
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && github.repository_owner == 'openmrs'
    permissions:
      contents: read

    env:
      HAS_APP_CREDS: ${{ secrets.APP_ID != '' && secrets.APP_PRIVATE_KEY != '' }}
      HAS_CREDS: ${{ (secrets.APP_ID != '' && secrets.APP_PRIVATE_KEY != '') || secrets.BOT_GH_TOKEN != '' }}
      PARTIAL_APP_CREDS: ${{ (secrets.APP_ID != '') != (secrets.APP_PRIVATE_KEY != '') }}

    steps:
      - name: 🔒 Reject partial App credentials
        if: env.PARTIAL_APP_CREDS == 'true'
        run: |
          echo "::error::APP_ID and APP_PRIVATE_KEY must be set together — got one without the other. Check for a typo in the caller's secret names."
          exit 1

      - name: 🔒 Verify dashboard sync credentials
        if: env.HAS_CREDS != 'true'
        run: |
          echo "::error::Syncing the report to the dashboard repo needs cross-repo credentials: set APP_ID + APP_PRIVATE_KEY (preferred) or BOT_GH_TOKEN. github.token cannot write to another repository."
          exit 1

      - name: Download Dependency Check report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Dependency Check report
          path: reports

      - name: 🔑 Generate GitHub App token
        id: app-token
        if: env.HAS_APP_CREDS == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: openmrs
          repositories: openmrs-contrib-dependency-vulnerability-dashboard

      - name: Checkout dependency vulnerability dashboard repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: openmrs/openmrs-contrib-dependency-vulnerability-dashboard
          token: ${{ steps.app-token.outputs.token || secrets.BOT_GH_TOKEN }}
          path: dashboard-repo

      - name: Copy report into dependency vulnerability dashboard repo
        run: |
          mkdir -p dashboard-repo/data
          cp reports/dependency-check-report.json dashboard-repo/data/${{ github.event.repository.name }}.json

      - name: Commit and push report
        run: |
          cd dashboard-repo
          git config user.name "OpenMRS Bot"
          git config user.email "infrastructure@openmrs.org"

          git add data/${{ github.event.repository.name }}.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update dependency check report for ${{ github.event.repository.name }}"
            git push
          fi
