name: Build Maven Project

on:
  workflow_call:
    inputs:
      java_versions:
        description: 'Java versions to build against (e.g. [8, 11, 17]). If omitted, defaults to the Java version inferred from the Maven compiler settings in pom.xml.'
        type: string
      main_java_version:
        description: 'Java version for publishing artifacts (must be in java_versions). If omitted, inferred from Maven compiler settings.'
        type: string
      java_distribution:
        description: 'Java distribution'
        type: string
        default: 'temurin'
      maven_args:
        description: 'Maven Arguments'
        type: string
        default: 'clean install'
      upload_coverage:
        description: 'Upload coverage reports to Codecov. If omitted, uploads when JaCoCo reports are found after the build. Set to "true" or "false" to override.'
        type: string
      deploy_snapshots:
        description: 'Whether to deploy SNAPSHOT artifacts to the Maven repository'
        type: boolean
        default: true
      deploy_branch:
        description: 'Branch name or JSON array of branch names that trigger SNAPSHOT deployment. If omitted, deploys from main, master, and version branches (e.g. 3.x, 2.8.x).'
        type: string
      maven_server_id:
        description: 'Maven server ID to use for SNAPSHOT deployment. If omitted, inferred from <distributionManagement><snapshotRepository><id> in pom.xml.'
        type: string
    secrets:
      MAVEN_REPO_USERNAME:
        description: 'Maven repository username'
        required: false
      MAVEN_REPO_API_KEY:
        description: 'Maven repository API key / password'
        required: false

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      java_versions: ${{ steps.params.outputs.java_versions }}
      main_java_version: ${{ steps.params.outputs.main_java_version }}
      snapshot_server_id: ${{ steps.deploy.outputs.snapshot_server_id }}
      deploy_branches: ${{ steps.deploy.outputs.deploy_branches }}
      is_snapshot: ${{ steps.deploy.outputs.is_snapshot }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Checkout shared actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: openmrs/openmrs-contrib-gha-workflows
          ref: ${{ github.job_workflow_sha }}
          sparse-checkout: |
            .github/actions
            .github/scripts
          sparse-checkout-cone-mode: false
          path: .gha-workflows

      - name: Infer backend parameters
        id: infer
        uses: ./.gha-workflows/.github/actions/infer-backend-params
        with:
          java_versions: ${{ inputs.java_versions }}
          main_java_version: ${{ inputs.main_java_version }}
          snapshot_server_id: ${{ inputs.maven_server_id }}

      - name: Resolve Java versions
        id: params
        env:
          JAVA_VERSIONS: ${{ steps.infer.outputs.java_versions }}
          MAIN_JAVA_VERSION: ${{ steps.infer.outputs.main_java_version }}
        run: |
          if [ -z "$MAIN_JAVA_VERSION" ]; then
            echo "::error::Java version could not be determined. Provide java_versions/main_java_version explicitly or ensure pom.xml has Maven compiler settings."
            exit 1
          fi
          echo "main_java_version=$MAIN_JAVA_VERSION" >> "$GITHUB_OUTPUT"

          # With no OpenMRS platform dependency to imply a version matrix,
          # build against the single compiler-target Java version by default.
          if [ -z "$JAVA_VERSIONS" ]; then
            JAVA_VERSIONS="[$MAIN_JAVA_VERSION]"
          fi
          echo "java_versions=$JAVA_VERSIONS" >> "$GITHUB_OUTPUT"

      - name: Resolve deploy parameters
        id: deploy
        uses: ./.gha-workflows/.github/actions/resolve-maven-deploy-params
        with:
          project_version: ${{ steps.infer.outputs.project_version }}
          inferred_snapshot_server_id: ${{ steps.infer.outputs.snapshot_server_id }}
          deploy_branch: ${{ inputs.deploy_branch }}
          ref_name: ${{ github.ref_name }}

  build:
    name: Build with Java ${{ matrix.java }}
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        java: ${{ fromJSON(needs.prepare.outputs.java_versions) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout shared actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: openmrs/openmrs-contrib-gha-workflows
          ref: ${{ github.job_workflow_sha }}
          sparse-checkout: |
            .github/actions
            .github/scripts
          sparse-checkout-cone-mode: false
          path: .gha-workflows

      - name: Build with Maven
        uses: ./.gha-workflows/.github/actions/maven-build
        with:
          java_version: ${{ matrix.java }}
          java_distribution: ${{ inputs.java_distribution }}
          maven_args: ${{ inputs.maven_args }}
          is_main_java: ${{ matrix.java == fromJSON(needs.prepare.outputs.main_java_version) }}
          upload_coverage: ${{ inputs.upload_coverage }}

  deploy:
    name: Deploy SNAPSHOT to Maven
    needs: [prepare, build]
    if: >-
      inputs.deploy_snapshots
      && needs.prepare.outputs.is_snapshot == 'true'
      && github.repository_owner == 'openmrs'
      && github.head_ref == ''
      && contains(fromJSON(needs.prepare.outputs.deploy_branches), github.ref_name)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout shared actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: openmrs/openmrs-contrib-gha-workflows
          ref: ${{ github.job_workflow_sha }}
          sparse-checkout: |
            .github/actions
            .github/scripts
          sparse-checkout-cone-mode: false
          path: .gha-workflows

      - name: Deploy SNAPSHOT to Maven
        uses: ./.gha-workflows/.github/actions/maven-deploy
        with:
          java_version: ${{ needs.prepare.outputs.main_java_version }}
          java_distribution: ${{ inputs.java_distribution }}
          server_id: ${{ needs.prepare.outputs.snapshot_server_id }}
          maven_repo_username: ${{ secrets.MAVEN_REPO_USERNAME }}
          maven_repo_api_key: ${{ secrets.MAVEN_REPO_API_KEY }}
