# Reusable on-demand PR review by Claude.
#
# Runs ONLY when a developer in the org's /dev/3-or-above GitHub teams comments
# "@claude review" on a pull request. It never runs automatically on PR open.
# Membership is the gate because a GitHub Action cannot read OpenMRS developer
# stages directly.
#
# IMPORTANT: the caller MUST trigger on `issue_comment` — this workflow reads
# `github.event.issue`/`github.event.comment`, which only exist for that event.
#
# Usage — add this to a repo as .github/workflows/claude-pr-review.yml:
#
#   name: Claude PR Review
#   on:
#     issue_comment:
#       types: [created]
#   jobs:
#     review:
#       uses: openmrs/openmrs-contrib-gha-workflows/.github/workflows/claude-pr-review.yml@main
#       secrets: inherit          # passes the org-level ANTHROPIC_API_KEY + DEV_STAGE_READ_TOKEN
#       permissions:
#         contents: read
#         pull-requests: write
#         issues: write
#         id-token: write
#
# Pin `@main` to a tag or commit SHA to control when methodology/behaviour changes
# reach your repo. Override any input (e.g. model/effort) via `with:` if needed.
name: Claude PR Review

on:
  workflow_call:
    inputs:
      reviewer_org:
        description: 'Org whose developer-stage teams gate who may invoke the review.'
        type: string
        default: openmrs
      reviewer_teams:
        description: 'Space-separated team slugs allowed to invoke (/dev/3 and above).'
        type: string
        default: 'dev-3 dev-4 dev-5'
      skill_url:
        description: 'Raw URL of the pr-review SKILL.md. Pin to a commit SHA.'
        type: string
        default: 'https://raw.githubusercontent.com/openmrs/openmrs-module-querystore/a5ea7a9b4640849d31b6adf65f0e5706a3a18666/.claude/skills/pr-review/SKILL.md'
      model:
        description: 'Claude model id.'
        type: string
        default: claude-opus-4-8
      effort:
        description: 'Reasoning effort: low | medium | high | xhigh | max.'
        type: string
        default: max
      max_turns:
        description: 'Maximum agent turns.'
        type: number
        default: 40
      timeout_minutes:
        description: 'Job timeout in minutes.'
        type: number
        default: 30
      show_full_output:
        description: 'Surface Claude''s full transcript (per-tool denials, and the reasoning behind a clean verdict) in the Actions log, for auditing/diagnostics. Exposes the transcript in the run log (registered secrets stay masked); leave off in steady state.'
        type: boolean
        default: false
    secrets:
      ANTHROPIC_API_KEY:
        description: 'Anthropic API key used for the review.'
        required: true
      DEV_STAGE_READ_TOKEN:
        description: 'A read:org token (owner must be an org member) used to check reviewer team membership. The default GITHUB_TOKEN cannot read org team membership.'
        required: true

jobs:
  review:
    # Cheap pre-filter: a PR comment (not a plain issue), not authored by a bot
    # (so the reviewer's own comment can never re-trigger this), containing the
    # trigger phrase.
    if: >
      github.event.issue.pull_request != null &&
      github.event.comment.user.type != 'Bot' &&
      contains(github.event.comment.body, '@claude review')
    runs-on: ubuntu-latest
    # Bound cost and stop a hung run. Generous because Opus at max effort plus
    # the skill's read-based verification take a while.
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read          # read-only: the hard guarantee that no code is pushed
      pull-requests: write     # read the PR/diff and post the review
      issues: write            # a PR conversation comment posts via the issues API
      id-token: write          # claude-code-action fetches an OIDC token on startup
    steps:
      # Fail-closed dev-stage gate: the commenter must be an active member of one
      # of the reviewer teams.
      - name: Verify commenter is /dev/3 or above
        id: gate
        env:
          GH_TOKEN: ${{ secrets.DEV_STAGE_READ_TOKEN }}
          LOGIN: ${{ github.event.comment.user.login }}
          REVIEWER_ORG: ${{ inputs.reviewer_org }}
          REVIEWER_TEAMS: ${{ inputs.reviewer_teams }}
        run: |
          allowed=false
          for team in $REVIEWER_TEAMS; do
            # Capture the state and compare in bash; do NOT pipe into grep for a
            # security gate. An active membership returns state "active".
            state="$(gh api "/orgs/${REVIEWER_ORG}/teams/${team}/memberships/${LOGIN}" \
                       --jq '.state' 2>/dev/null || true)"
            if [ "$state" = "active" ]; then
              allowed=true
              echo "::notice::${LOGIN} is a member of ${REVIEWER_ORG}/${team}; proceeding."
              break
            fi
          done
          echo "allowed=${allowed}" >> "$GITHUB_OUTPUT"
          if [ "$allowed" = false ]; then
            echo "::notice::${LOGIN} is not /dev/3+ (not in: ${REVIEWER_TEAMS}); skipping."
          fi

      # issue_comment checks out the default branch by default. Fetch the PR head
      # instead so the review sees the PR's code. fetch-depth: 0 is required by
      # the skill's local-git verification (merge-base, diffing against the base,
      # drift checks). This ref resolves for fork PRs too.
      - name: Check out the PR head
        if: steps.gate.outputs.allowed == 'true'
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
          fetch-depth: 0

      # Pull the review methodology from the trusted source into a temp path
      # OUTSIDE the checked-out PR tree, so a malicious PR cannot substitute its
      # own SKILL.md. Fail loudly if it's missing or unexpected.
      - name: Fetch the pr-review skill
        if: steps.gate.outputs.allowed == 'true'
        env:
          SKILL_URL: ${{ inputs.skill_url }}
        run: |
          dest="$RUNNER_TEMP/pr-review-SKILL.md"
          curl -fsSL "$SKILL_URL" -o "$dest"
          test -s "$dest"
          grep -q "name: pr-review" "$dest"
          echo "Fetched pr-review skill ($(wc -l < "$dest") lines)."

      # Snapshot how much claude[bot] has already posted on this PR, so the step
      # after the review can tell whether this run posted anything new.
      - name: Snapshot bot review activity
        id: pre
        if: steps.gate.outputs.allowed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.issue.number }}
        run: |
          r=$(gh api "repos/$REPO/pulls/$PR/reviews" --paginate --jq '[.[]|select(.user.login=="claude[bot]")]|length')
          c=$(gh api "repos/$REPO/pulls/$PR/comments?per_page=100" --paginate --jq '[.[]|select(.user.login=="claude[bot]")]|length')
          i=$(gh api "repos/$REPO/issues/$PR/comments?per_page=100" --paginate --jq '[.[]|select(.user.login=="claude[bot]")]|length')
          echo "count=$((r + c + i))" >> "$GITHUB_OUTPUT"

      - name: Review
        id: review
        if: steps.gate.outputs.allowed == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          # The skill posts its review through `gh api .../reviews`; give gh the
          # workflow token so those calls are authenticated.
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Off by default; set input show_full_output: true on a caller to audit
          # what the review actually verified (e.g. why a PR was deemed clean).
          show_full_output: ${{ inputs.show_full_output }}
          # No trigger_phrase: supplying `prompt` selects automation mode. The
          # methodology comes from the pr-review skill, injected as a system
          # prompt via --append-system-prompt-file (skills are not reliably
          # auto-invoked in automation mode, so injecting the file is dependable).
          prompt: |
            Review pull request #${{ github.event.issue.number }} in the
            repository ${{ github.repository }}, following the PR-review
            methodology appended to your system prompt exactly: its verification
            requirements, its rules for every inline comment, and its posting
            rules. Post the review to the PR the way the skill's `--post` does —
            submit the findings as inline review comments through the GitHub API.
            This runs in CI with no interactive user to report back to, so if the
            PR is clean with nothing to act on, post nothing.

            Security constraint — this OVERRIDES the skill wherever they differ:
            you are reviewing untrusted PR code, so never execute the
            repository's own code. Do not run its build or tests (mvn, gradle,
            npm, make, and the like), and do not run any script or binary from
            the tree, including inside worktrees. This ban is on the PR's code
            only — your own read-only tooling is expected: use git
            (diff/log/grep), gh (pr diff, api), curl to fetch upstream
            references, and python to assemble the review payload you post.
            Where the skill would build something to verify it (e.g. a
            build-config PR), you cannot run that build here — treat it as an
            experiment that cannot run and report the check as a question, per
            the skill's own rule, rather than asserting it as fact.
          # Tool permissions: claude-code-action denies all tools by default in
          # automation mode, so the skill's gh/git/python Bash calls must be
          # explicitly allowed or it can never post. Write/Edit stay denied.
          claude_args: |
            --model ${{ inputs.model }}
            --effort ${{ inputs.effort }}
            --append-system-prompt-file ${{ runner.temp }}/pr-review-SKILL.md
            --max-turns ${{ inputs.max_turns }}
            --allowedTools "Bash,Read,Grep,Glob,mcp__github_inline_comment__create_inline_comment"
            --disallowedTools "Write,Edit"

      # A clean review posts nothing, leaving no trace on the PR. Add a 👍 to the
      # triggering comment so the author knows it ran and found nothing — without
      # the LGTM-comment noise the skill deliberately avoids. If the review DID
      # post (new review/comment activity), that is the signal, so no reaction.
      - name: Acknowledge a clean review with a reaction
        if: steps.gate.outputs.allowed == 'true' && steps.review.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
          BEFORE: ${{ steps.pre.outputs.count }}
        run: |
          sleep 10   # let GitHub's read side catch up with anything just posted
          r=$(gh api "repos/$REPO/pulls/$PR/reviews" --paginate --jq '[.[]|select(.user.login=="claude[bot]")]|length')
          c=$(gh api "repos/$REPO/pulls/$PR/comments?per_page=100" --paginate --jq '[.[]|select(.user.login=="claude[bot]")]|length')
          i=$(gh api "repos/$REPO/issues/$PR/comments?per_page=100" --paginate --jq '[.[]|select(.user.login=="claude[bot]")]|length')
          after=$((r + c + i))
          if [ "$after" -le "${BEFORE:-0}" ]; then
            echo "No new claude[bot] activity — clean review; adding 👍 to comment $COMMENT_ID."
            gh api --method POST "repos/$REPO/issues/comments/$COMMENT_ID/reactions" -f content='+1' >/dev/null
          else
            echo "Review posted $((after - ${BEFORE:-0})) item(s); the review is the signal, no reaction."
          fi
