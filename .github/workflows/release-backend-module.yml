name: Release OpenMRS Maven Module

on:
  workflow_call:
    inputs:
      release_version:
        description: 'Release version (e.g., 1.3.3)'
        type: string
        required: true
      development_version:
        description: 'Next development version (e.g., 1.4.0-SNAPSHOT)'
        type: string
        required: true
      java_version:
        description: 'Java version to use for the release. If omitted, inferred from Maven compiler settings in pom.xml.'
        type: string
      java_distribution:
        description: 'Java distribution'
        type: string
        default: 'temurin'
      git_user_name:
        description: 'Git committer name for release commits'
        type: string
        default: 'openmrs-bot'
      git_user_email:
        description: 'Git committer email for release commits'
        type: string
        default: 'infrastructure@openmrs.org'
      branch:
        description: 'Branch to release from. If omitted, uses the branch that triggered the workflow.'
        type: string
        required: false
      maven_release_server_id:
        description: 'Maven server ID for release deployment. If omitted, inferred from <distributionManagement><repository><id> in pom.xml.'
        type: string
        required: false
      maven_snapshot_server_id:
        description: 'Maven server ID for snapshot deployment. If omitted, inferred from <distributionManagement><snapshotRepository><id> in pom.xml.'
        type: string
        required: false
      create_github_release:
        description: 'Whether to create a GitHub Release with release notes after Maven release'
        type: boolean
        default: true
    secrets:
      MAVEN_REPO_USERNAME:
        description: 'Maven repository username'
        required: true
      MAVEN_REPO_API_KEY:
        description: 'Maven repository API key / password'
        required: true
      GPG_PRIVATE_KEY:
        description: 'ASCII-armored GPG private key for signing release artifacts. When omitted, artifacts are not signed.'
        required: false
      GPG_PASSPHRASE:
        description: 'Passphrase for the GPG private key'
        required: false
      APP_ID:
        description: 'GitHub App ID for the module release bot. When set with APP_PRIVATE_KEY, a short-lived App token is preferred over BOT_PAT. The App must be on the target ruleset bypass list to push past branch protection.'
        required: false
      APP_PRIVATE_KEY:
        description: 'Private key for the module release bot GitHub App.'
        required: false
      BOT_PAT:
        description: 'Legacy Personal Access Token for bypassing branch protections. Fallback when App credentials are not provided.'
        required: false

jobs:
  release:
    name: Release to Maven
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: release-${{ github.repository }}-${{ inputs.branch || github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.tag.outputs.name }}
    env:
      HAS_APP_CREDS: ${{ secrets.APP_ID != '' && secrets.APP_PRIVATE_KEY != '' }}

    steps:
      - name: Validate version inputs
        run: |
          SEMVER_REGEX='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)(\.(0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*))*)){0,1}(\+([0-9a-zA-Z-]+(\.[0-9a-zA-Z-]+)*)){0,1}$'
          if [[ ! "$RELEASE_VERSION" =~ $SEMVER_REGEX ]]; then
            echo "::error::Release version '$RELEASE_VERSION' is not valid semver (e.g., 1.3.3)"
            exit 1
          fi
          if [[ "$RELEASE_VERSION" =~ -[Ss][Nn][Aa][Pp][Ss][Hh][Oo][Tt]$ ]]; then
            echo "::error::Release version '$RELEASE_VERSION' cannot be a SNAPSHOT"
            exit 1
          fi
          if [[ -n "$DEVELOPMENT_VERSION" && ! "$DEVELOPMENT_VERSION" =~ $SEMVER_REGEX ]]; then
            echo "::error::Development version '$DEVELOPMENT_VERSION' is not valid semver (e.g., 1.4.0-SNAPSHOT)"
            exit 1
          fi

          {
            echo "### Release Parameters 🚀"
            echo "- **Release Version:** \`$RELEASE_VERSION\`"
            echo "- **Next Development Version:** \`$DEVELOPMENT_VERSION\`"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Versions validated: release=$RELEASE_VERSION, development=$DEVELOPMENT_VERSION"
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          DEVELOPMENT_VERSION: ${{ inputs.development_version }}

      - name: Resolve branch
        id: branch
        env:
          INPUT_BRANCH: ${{ inputs.branch }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          if [ -n "$INPUT_BRANCH" ]; then
            echo "name=$INPUT_BRANCH" >> "$GITHUB_OUTPUT"
          elif [ "$REF_NAME" = "main" ] || [ "$REF_NAME" = "master" ]; then
            echo "name=$REF_NAME" >> "$GITHUB_OUTPUT"
          elif echo "$REF_NAME" | grep -qE '^[0-9]+\.x$|^[0-9]+\.[0-9]+\.x$'; then
            PREFIX="${REF_NAME%.x}."
            if [[ "$RELEASE_VERSION" == "$PREFIX"* ]]; then
              echo "name=$REF_NAME" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Branch '$REF_NAME' does not match release version '$RELEASE_VERSION' (expected prefix '$PREFIX'). Provide the branch explicitly."
              exit 1
            fi
          else
            echo "::error::Cannot auto-detect release branch from '$REF_NAME'. Provide the branch explicitly."
            exit 1
          fi

      - name: Validate branch
        run: |
          # Ensure branch name contains only valid git branch characters
          if [[ ! "$BRANCH" =~ ^[a-zA-Z0-9._/-]+$ ]]; then
            echo "::error::Branch name '$BRANCH' contains invalid characters. Only alphanumeric, '.', '_', '/' and '-' are allowed."
            exit 1
          fi
          # Verify the branch exists in the remote repository (requires public repo)
          if ! git ls-remote --exit-code --heads "https://github.com/$REPO.git" "$BRANCH" > /dev/null 2>&1; then
            echo "::error::Branch '$BRANCH' does not exist in $REPO"
            exit 1
          fi

          echo "- **Target Branch:** \`$BRANCH\`" >> "$GITHUB_STEP_SUMMARY"

          echo "Branch validated: $BRANCH exists in $REPO"
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
          REPO: ${{ github.repository }}

      - name: Generate GitHub App token
        id: app-token
        if: env.HAS_APP_CREDS == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ steps.branch.outputs.name }}
          token: ${{ steps.app-token.outputs.token || secrets.BOT_PAT || github.token }}

      - name: Checkout release scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: openmrs/openmrs-contrib-bamboo
          path: release-scripts
          sparse-checkout: release-prepare-perform.sh
          sparse-checkout-cone-mode: false

      - name: Checkout inference action
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: openmrs/openmrs-contrib-gha-workflows
          ref: ${{ github.job_workflow_sha }}
          sparse-checkout: |
            .github/actions
            .github/scripts
          sparse-checkout-cone-mode: false
          path: .gha-workflows

      - name: Infer backend parameters
        id: infer
        uses: ./.gha-workflows/.github/actions/infer-backend-params
        with:
          main_java_version: ${{ inputs.java_version }}
          snapshot_server_id: ${{ inputs.maven_snapshot_server_id }}
          release_server_id: ${{ inputs.maven_release_server_id }}

      - name: Resolve Java version
        id: java
        env:
          INFERRED_JAVA_VERSION: ${{ steps.infer.outputs.main_java_version }}
        run: |
          echo "version=${INFERRED_JAVA_VERSION:-8}" >> "$GITHUB_OUTPUT"

      - name: Resolve Maven release server ID
        id: release-server
        env:
          INFERRED_RELEASE_ID: ${{ steps.infer.outputs.release_server_id }}
        run: |
          echo "id=${INFERRED_RELEASE_ID:-openmrs-repo-modules}" >> "$GITHUB_OUTPUT"

      - name: Resolve Maven snapshot server ID
        id: snapshot-server
        env:
          INFERRED_SNAPSHOT_ID: ${{ steps.infer.outputs.snapshot_server_id }}
        run: |
          echo "id=${INFERRED_SNAPSHOT_ID:-openmrs-repo-snapshots}" >> "$GITHUB_OUTPUT"

      - name: Compute release tag name
        id: tag
        env:
          TAG_FORMAT: ${{ steps.infer.outputs.release_tag_format }}
          ARTIFACT_ID: ${{ steps.infer.outputs.project_artifact_id }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          # Resolve the maven-release-plugin tag name by substituting the
          # placeholders the plugin supports for the values it would use at
          # release time (artifactId is stable; version is the release version).
          TAG_NAME="$TAG_FORMAT"
          TAG_NAME="${TAG_NAME//@\{project.artifactId\}/$ARTIFACT_ID}"
          TAG_NAME="${TAG_NAME//@\{project.version\}/$RELEASE_VERSION}"
          if [[ "$TAG_NAME" == *"@{"* ]]; then
            echo "::error::Unresolved placeholder in release tag name '$TAG_NAME' (format: '$TAG_FORMAT'). Only @{project.artifactId} and @{project.version} are supported."
            exit 1
          fi
          echo "name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "- **Release Tag:** \`$TAG_NAME\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Computed release tag name: $TAG_NAME"

      - name: Set up Java ${{ steps.java.outputs.version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ steps.java.outputs.version }}
          distribution: ${{ inputs.java_distribution }}
          cache: maven
          overwrite-settings: false

      - name: Set up Maven settings
        env:
          RELEASE_ID: ${{ steps.release-server.outputs.id }}
          SNAPSHOT_ID: ${{ steps.snapshot-server.outputs.id }}
        run: |
          for id in "$RELEASE_ID" "$SNAPSHOT_ID"; do
            if [[ ! "$id" =~ ^[a-zA-Z0-9._-]+$ ]]; then
              echo "::error::Maven server ID '$id' contains invalid characters"
              exit 1
            fi
          done
          mkdir -p "$HOME/.m2"
          cat > "$HOME/.m2/settings.xml" << EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
            xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
            xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>$RELEASE_ID</id>
                <username>\${env.MAVEN_REPO_USERNAME}</username>
                <password>\${env.MAVEN_REPO_API_KEY}</password>
              </server>
              <server>
                <id>$SNAPSHOT_ID</id>
                <username>\${env.MAVEN_REPO_USERNAME}</username>
                <password>\${env.MAVEN_REPO_API_KEY}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Verify tag does not exist
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Tag $RELEASE_TAG already exists. Release aborted to prevent overwriting."
            exit 1
          fi
          mvn release:clean -B 2>/dev/null || true
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.name }}

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          else
            echo "No GPG_PRIVATE_KEY secret provided; skipping import. Artifacts will not be signed."
          fi

      - name: Release prepare and perform
        run: |
          MAVEN_HOME="$(mvn -v 2>/dev/null | grep 'Maven home:' | sed 's/Maven home: //')"
          export MAVEN_HOME
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global user.email "$GIT_USER_EMAIL"
          git config --global user.name "$GIT_USER_NAME"
          export MAVEN_OPTS="-Denv.MAVEN_REPO_USERNAME=$MAVEN_REPO_USERNAME -Denv.MAVEN_REPO_API_KEY=$MAVEN_REPO_API_KEY"
          ./release-scripts/release-prepare-perform.sh \
            -r "$RELEASE_VERSION" \
            -d "$DEVELOPMENT_VERSION" \
            -e "https://github.com/$REPO.git" \
            -s
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          DEVELOPMENT_VERSION: ${{ inputs.development_version }}
          GIT_USER_NAME: ${{ inputs.git_user_name }}
          GIT_USER_EMAIL: ${{ inputs.git_user_email }}
          MAVEN_REPO_USERNAME: ${{ secrets.MAVEN_REPO_USERNAME }}
          MAVEN_REPO_API_KEY: ${{ secrets.MAVEN_REPO_API_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          REPO: ${{ github.repository }}

  github-release:
    name: Create GitHub Release
    needs: release
    if: ${{ inputs.create_github_release }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Wait for tag to be reachable
        run: |
          MAX_RETRIES=5
          DELAY=15
          for i in $(seq 1 "$MAX_RETRIES"); do
            if git ls-remote --exit-code --tags "https://github.com/$REPO.git" "refs/tags/$RELEASE_TAG" > /dev/null 2>&1; then
              echo "Tag $RELEASE_TAG is reachable (attempt $i/$MAX_RETRIES)"
              exit 0
            fi
            echo "Tag $RELEASE_TAG not yet reachable (attempt $i/$MAX_RETRIES). Retrying in ${DELAY}s..."
            sleep "$DELAY"
          done
          echo "::error::Tag $RELEASE_TAG was not reachable after $MAX_RETRIES attempts"
          exit 1
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag_name }}
          REPO: ${{ github.repository }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.release.outputs.tag_name }}

      - name: Create Release Notes
        uses: openmrs/openmrs-contrib-create-release-notes@aa823dd951f06f4637c22e25a0283b929b505d23 # v1.0.3
        id: create-release-notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          head-ref: refs/tags/${{ needs.release.outputs.tag_name }}

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.release.outputs.tag_name }}
          name: ${{ inputs.release_version }}
          body: |
            ## What's Changed
            ${{ steps.create-release-notes.outputs.release-notes }}
          draft: false
          prerelease: false
