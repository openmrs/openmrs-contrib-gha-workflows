name: Release OpenMRS Maven Module

on:
  workflow_call:
    inputs:
      release_version:
        description: 'Release version (e.g., 1.3.3)'
        type: string
        required: true
      development_version:
        description: 'Next development version (e.g., 1.4.0-SNAPSHOT)'
        type: string
        required: true
      java_version:
        description: 'Java version to use for the release'
        type: string
        default: '8'
      java_distribution:
        description: 'Java distribution'
        type: string
        default: 'temurin'
      git_user_name:
        description: 'Git committer name for release commits'
        type: string
        default: 'openmrs-bot'
      git_user_email:
        description: 'Git committer email for release commits'
        type: string
        default: 'infrastructure@openmrs.org'
      branch:
        description: 'Branch to release from'
        type: string
        required: false
        default: 'master'
      maven_server_id:
        description: 'Maven server ID to use for deployment'
        type: string
        required: false
        default: 'openmrs-repo-modules'
    secrets:
      MAVEN_REPO_USERNAME:
        description: 'Maven repository username'
        required: true
      MAVEN_REPO_API_KEY:
        description: 'Maven repository API key / password'
        required: true
      BOT_PAT:
        description: 'Personal Access Token for bypassing branch protections'
        required: false

jobs:
  release:
    name: Release to Maven
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: release-${{ github.repository }}-${{ inputs.branch }}
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Validate version inputs
        run: |
          SEMVER_REGEX='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)(\.(0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*))*)){0,1}(\+([0-9a-zA-Z-]+(\.[0-9a-zA-Z-]+)*)){0,1}$'
          if [[ ! "$RELEASE_VERSION" =~ $SEMVER_REGEX ]]; then
            echo "::error::Release version '$RELEASE_VERSION' is not valid semver (e.g., 1.3.3)"
            exit 1
          fi
          if [[ "$RELEASE_VERSION" =~ -[Ss][Nn][Aa][Pp][Ss][Hh][Oo][Tt]$ ]]; then
            echo "::error::Release version '$RELEASE_VERSION' cannot be a SNAPSHOT"
            exit 1
          fi
          if [[ -n "$DEVELOPMENT_VERSION" && ! "$DEVELOPMENT_VERSION" =~ $SEMVER_REGEX ]]; then
            echo "::error::Development version '$DEVELOPMENT_VERSION' is not valid semver (e.g., 1.4.0-SNAPSHOT)"
            exit 1
          fi

          echo "### Release Parameters 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Version:** \`$RELEASE_VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Next Development Version:** \`$DEVELOPMENT_VERSION\`" >> $GITHUB_STEP_SUMMARY

          echo "Versions validated: release=$RELEASE_VERSION, development=$DEVELOPMENT_VERSION"
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          DEVELOPMENT_VERSION: ${{ inputs.development_version }}

      - name: Validate branch
        run: |
          # Ensure branch name contains only valid git branch characters
          if [[ ! "$BRANCH" =~ ^[a-zA-Z0-9._/-]+$ ]]; then
            echo "::error::Branch name '$BRANCH' contains invalid characters. Only alphanumeric, '.', '_', '/' and '-' are allowed."
            exit 1
          fi
          # Verify the branch exists in the remote repository (requires public repo)
          if ! git ls-remote --exit-code --heads "https://github.com/$REPO.git" "$BRANCH" > /dev/null 2>&1; then
            echo "::error::Branch '$BRANCH' does not exist in $REPO"
            exit 1
          fi

          echo "- **Target Branch:** \`$BRANCH\`" >> $GITHUB_STEP_SUMMARY

          echo "Branch validated: $BRANCH exists in $REPO"
        env:
          BRANCH: ${{ inputs.branch }}
          REPO: ${{ github.repository }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch }}
          token: ${{ secrets.BOT_PAT || github.token }}

      - name: Checkout release scripts
        uses: actions/checkout@v6
        with:
          repository: openmrs/openmrs-contrib-bamboo
          path: release-scripts
          sparse-checkout: release-prepare-perform.sh
          sparse-checkout-cone-mode: false

      - name: Set up Java ${{ inputs.java_version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java_version }}
          distribution: ${{ inputs.java_distribution }}
          cache: maven
          server-id: ${{ inputs.maven_server_id }}
          server-username: MAVEN_REPO_USERNAME
          server-password: MAVEN_REPO_API_KEY

      - name: Verify tag does not exist
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "::error::Tag $RELEASE_VERSION already exists. Release aborted to prevent overwriting."
            exit 1
          fi
          mvn release:clean -B 2>/dev/null || true
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}

      - name: Release prepare and perform
        run: |
          export MAVEN_HOME="$(mvn -v 2>/dev/null | grep 'Maven home:' | sed 's/Maven home: //')"
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global user.email "$GIT_USER_EMAIL"
          git config --global user.name "$GIT_USER_NAME"
          export MAVEN_OPTS="-Denv.MAVEN_REPO_USERNAME=$MAVEN_REPO_USERNAME -Denv.MAVEN_REPO_API_KEY=$MAVEN_REPO_API_KEY"
          ./release-scripts/release-prepare-perform.sh \
            -r "$RELEASE_VERSION" \
            -d "$DEVELOPMENT_VERSION" \
            -e "https://github.com/$REPO.git" \
            -s
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          DEVELOPMENT_VERSION: ${{ inputs.development_version }}
          GIT_USER_NAME: ${{ inputs.git_user_name }}
          GIT_USER_EMAIL: ${{ inputs.git_user_email }}
          MAVEN_REPO_USERNAME: ${{ secrets.MAVEN_REPO_USERNAME }}
          MAVEN_REPO_API_KEY: ${{ secrets.MAVEN_REPO_API_KEY }}
          REPO: ${{ github.repository }}
