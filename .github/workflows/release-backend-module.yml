name: Release OpenMRS Maven Module

on:
  workflow_call:
    inputs:
      release_version:
        description: 'Release version (e.g., 1.3.3)'
        type: string
        required: true
      development_version:
        description: 'Next development version (e.g., 1.4.0-SNAPSHOT)'
        type: string
        required: true
      java_version:
        description: 'Java version to use for the release'
        type: string
        default: '8'
      java_distribution:
        description: 'Java distribution'
        type: string
        default: 'temurin'
      git_user_name:
        description: 'Git committer name for release commits'
        type: string
        default: 'openmrs-bot'
      git_user_email:
        description: 'Git committer email for release commits'
        type: string
        default: 'info@openmrs.org'
      create_distro_pr:
        description: 'Create a PR in openmrs-distro-referenceapplication to update the module version'
        type: boolean
        default: false
      distro_property_name:
        description: 'The property name in the distro pom.xml to update (e.g., fhir2.version). Required if create_distro_pr is true.'
        type: string
        default: ''
    secrets:
      MAVEN_REPO_USERNAME:
        description: 'Maven repository username'
        required: true
      MAVEN_REPO_API_KEY:
        description: 'Maven repository API key / password'
        required: true
      OMRS_BOT_GH_TOKEN:
        description: 'GitHub token for the OpenMRS bot account, used to create the distro PR'
        required: false

jobs:
  release:
    name: Release to Maven
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: release-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Validate version inputs
        run: |
          SEMVER_REGEX='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)(\.(0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*))*)){0,1}(\+([0-9a-zA-Z-]+(\.[0-9a-zA-Z-]+)*)){0,1}$'
          if [[ ! "$RELEASE_VERSION" =~ $SEMVER_REGEX ]]; then
            echo "::error::Release version '$RELEASE_VERSION' is not valid semver (e.g., 1.3.3)"
            exit 1
          fi
          if [[ "$RELEASE_VERSION" =~ -[Ss][Nn][Aa][Pp][Ss][Hh][Oo][Tt]$ ]]; then
            echo "::error::Release version '$RELEASE_VERSION' cannot be a SNAPSHOT"
            exit 1
          fi
          if [[ -n "$DEVELOPMENT_VERSION" && ! "$DEVELOPMENT_VERSION" =~ $SEMVER_REGEX ]]; then
            echo "::error::Development version '$DEVELOPMENT_VERSION' is not valid semver (e.g., 1.4.0-SNAPSHOT)"
            exit 1
          fi
          echo "Versions validated: release=$RELEASE_VERSION, development=$DEVELOPMENT_VERSION"
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          DEVELOPMENT_VERSION: ${{ inputs.development_version }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout release scripts
        uses: actions/checkout@v6
        with:
          repository: openmrs/openmrs-contrib-bamboo
          path: release-scripts
          sparse-checkout: release-prepare-perform.sh
          sparse-checkout-cone-mode: false

      - name: Set up Java ${{ inputs.java_version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java_version }}
          distribution: ${{ inputs.java_distribution }}
          cache: maven

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>openmrs-repo-modules</id>
                <username>${env.MAVEN_REPO_USERNAME}</username>
                <password>${env.MAVEN_REPO_API_KEY}</password>
              </server>
              <server>
                <id>openmrs-repo-snapshots</id>
                <username>${env.MAVEN_REPO_USERNAME}</username>
                <password>${env.MAVEN_REPO_API_KEY}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Clean up any leftover release artifacts
        run: |
          git tag -d "$RELEASE_VERSION" 2>/dev/null || true
          git push origin ":refs/tags/$RELEASE_VERSION" 2>/dev/null || true
          mvn release:clean -B 2>/dev/null || true
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}

      - name: Release prepare and perform
        run: |
          export MAVEN_HOME="$(mvn -v 2>/dev/null | grep 'Maven home:' | sed 's/Maven home: //')"
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global user.email "$GIT_USER_EMAIL"
          git config --global user.name "$GIT_USER_NAME"
          export MAVEN_OPTS="-Denv.MAVEN_REPO_USERNAME=$MAVEN_REPO_USERNAME -Denv.MAVEN_REPO_API_KEY=$MAVEN_REPO_API_KEY"
          ./release-scripts/release-prepare-perform.sh \
            -r "$RELEASE_VERSION" \
            -d "$DEVELOPMENT_VERSION" \
            -e "https://github.com/${{ github.repository }}.git" \
            -s
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          DEVELOPMENT_VERSION: ${{ inputs.development_version }}
          GIT_USER_NAME: ${{ inputs.git_user_name }}
          GIT_USER_EMAIL: ${{ inputs.git_user_email }}
          MAVEN_REPO_USERNAME: ${{ secrets.MAVEN_REPO_USERNAME }}
          MAVEN_REPO_API_KEY: ${{ secrets.MAVEN_REPO_API_KEY }}

  create-distro-pr:
    name: Create Distro Ref App PR
    runs-on: ubuntu-latest
    needs: release
    if: ${{ inputs.create_distro_pr }}
    permissions:
      contents: read

    steps:
      - name: Validate distro_property_name input
        run: |
          if [[ -z "$DISTRO_PROPERTY_NAME" ]]; then
            echo "::error::distro_property_name input is required when create_distro_pr is true"
            exit 1
          fi
        env:
          DISTRO_PROPERTY_NAME: ${{ inputs.distro_property_name }}

      - name: Checkout openmrs-distro-referenceapplication
        uses: actions/checkout@v6
        with:
          repository: openmrs/openmrs-distro-referenceapplication
          token: ${{ secrets.OMRS_BOT_GH_TOKEN }}
          fetch-depth: 1

      - name: Update version in distro pom.xml
        run: |
          sed -i "s|<${DISTRO_PROPERTY_NAME}>[^<]*</${DISTRO_PROPERTY_NAME}>|<${DISTRO_PROPERTY_NAME}>${RELEASE_VERSION}</${DISTRO_PROPERTY_NAME}>|" distro/pom.xml
          if git diff --quiet; then
            echo "::error::No change made to distro/pom.xml. Check that distro_property_name '${DISTRO_PROPERTY_NAME}' exists in distro/pom.xml."
            exit 1
          fi
        env:
          DISTRO_PROPERTY_NAME: ${{ inputs.distro_property_name }}
          RELEASE_VERSION: ${{ inputs.release_version }}

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.OMRS_BOT_GH_TOKEN }}
          commit-message: "Bump ${{ inputs.distro_property_name }} to ${{ inputs.release_version }}"
          author: "openmrs-bot <info@openmrs.org>"
          committer: "openmrs-bot <info@openmrs.org>"
          branch: "bump/${{ inputs.distro_property_name }}-${{ inputs.release_version }}"
          delete-branch: true
          title: "Bump ${{ inputs.distro_property_name }} to ${{ inputs.release_version }}"
          body: |
            Automated PR to update `${{ inputs.distro_property_name }}` to `${{ inputs.release_version }}` in `distro/pom.xml`.

            Released from: ${{ github.server_url }}/${{ github.repository }}
          labels: "release,automated-pr"
