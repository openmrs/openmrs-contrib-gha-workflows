nodeLinker: node-modules
enableTelemetry: false

# A committed Yarn release (resolved via yarnPath) mirrors how real OpenMRS
# frontend repos pin Yarn: even the runner's classic Yarn delegates to it, so
# `setup-node`'s `cache: yarn` step and `yarn install --immutable` both work
# without Corepack.
yarnPath: .yarn/releases/yarn-4.9.1.cjs
